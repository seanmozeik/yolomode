ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçí${ahead_count}Ôçú${behind_count}"
staged = "[+${count}](green)"
modified = "[!${count}](yellow)"
untracked = "[?${count}](red)"

