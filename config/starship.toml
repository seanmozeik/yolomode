format = "[$symbol]($style)"

[cpp]
symbol = "¯İØ "
format = "[$symbol]($style)"

[cmake]
symbol = "¯Şö "
format = "[$symbol]($style)"

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "took [$duration]($style)"

[directory]
style = "bold teal"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " ¾░î¥"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "ÔÇĞ/"

[docker_context]
symbol = "´îê "

[fill]
