# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_frappe"

format = """
[ÔöÅÔöü](overlay2) $os[YOLOMODE](bold red) $hostname
[Ôöâ ](overlay2)$directory$git_branch$git_status$git_state$bun$python$rust$golang$java$cpp$c$cmake
[Ôöù](overlay2)$character"""
right_format = "$cmd_duration"

[bun]
symbol = "¯Ø» "
format = "[$symbol($version )]($style)"

[character]
success_symbol = "[ÔöüÔöüÔöüÔöü](overlay2)[ÔùÅ](white)"
error_symbol = "[ÔöüÔöüÔöüÔöü](overlay2)[ÔùÅ](bold red)"

[c]
